<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SETOR ROBÔ - Relatório Oficial</title>
   
   
   
   <style>
        :root {
            --primary: #fbc02d;
            --dark-bg: #121212;
            --card-bg: #f8f9fa;
            --danger: #c62828;
            --success: #2e7d32;
            --blue: #0277bd;
            --gray: #6c757d;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: #333; margin: 0; padding: 0; }
        
        /* MARCA D'ÁGUA DANIEL */
   
@keyframes flutuar {
    0%   { transform: translate(5vw, 10vh) rotate(0deg); }
    25%  { transform: translate(70vw, 20vh) rotate(10deg); }
    50%  { transform: translate(60vw, 70vh) rotate(0deg); }
    75%  { transform: translate(10vw, 60vh) rotate(-10deg); }
    100% { transform: translate(5vw, 10vh) rotate(0deg); }
}

.marca-dagua-viva {
    position: fixed; 
    top: 0; 
    left: 0; 
    font-size: 45px; 
    font-weight: 900;
    color: rgba(255, 152, 0, 0.15); 
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    white-space: nowrap;
    pointer-events: none; 
    z-index: 9999; 
    animation: flutuar 40s linear infinite;
    user-select: none;
}

@media print {
    .marca-dagua-viva { display: none !important; }
}

       
       
       
       
       
       
       
       
        .container-filtros { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .btn-so-problema { background: var(--danger); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }

        .grid-filtros { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .campo-busca { display: flex; flex-direction: column; }
        .campo-busca label { font-size: 10px; font-weight: bold; margin-bottom: 5px; color: #666; text-transform: uppercase; }
        .campo-busca input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; outline: none; }

        .btn-limpar { width: 100%; margin-top: 10px; padding: 10px; background: var(--gray); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; }

        .painel-total { max-width: 1100px; margin: 20px auto; background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center; color: white; border: 1px solid #333; }
        .painel-total h2 { margin: 0; font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .painel-total span { font-size: 40px; color: var(--primary); font-weight: bold; }

        .tabela-container { max-width: 1100px; margin: 0 auto 50px auto; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #222; color: var(--primary); padding: 15px; font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; color: #333; }
        tr:nth-child(even) { background: #f9f9f9; }
        
        .status-ok { color: var(--success); font-weight: bold; background: #e8f5e9; padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
        .status-erro { color: white; font-weight: bold; background: var(--danger); padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }

        @media print {
    
}

            /* REMOVER RISCOS DOS BOTÕES DO TOPO */
        .nav-botoes a {
            text-decoration: none; /* Tira o sublinhado */
            padding: 10px 15px;
            display: inline-block;
            border-radius: 5px;
            color: white;
            margin: 5px;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 13px;
        }
        
        .btn-nav {
            border: none;     /* Tira a borda do botão imprimir */
            outline: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

    </style>
</head>
<body>
<div class="marca-dagua-viva">D.artcom--Daniel</div>

    <div class="header-relatorio">
        <h1 style="margin:0; font-size: 26px;">SETOR ROBÔ</h1>
        <p style="margin:0; font-size: 12px; font-weight: bold;">RELATÓRIO DE PRODUÇÃO OFICIAL SINCRONIZADO</p>
    </div>

    <div class="nav-botoes">
        
        
        
        
           
          
     
         <a href="cadastro.html" style="background:#6f42c1;">📝 CADASTRO</a>
        <a href="../index.html" style="background: var(--blue);">🏠 Início</a>
        <a href="entrada.html" style="background: var(--success);">📥 Entrada</a>
        <a href="saida.html" style="background: var(--danger);">📤 Saída</a>
         <a href="geral.html" style="background:hsl(41, 96%, 48%)"> 📊 Relatório GeralTES</a>
        <a href="geral.html" style="background:hsl(41, 96%, 48%)"> 📊 Relatório Geral</a>
        
        
        
        
        <button onclick="window.print()" class="btn-nav" style="background: var(--blue);">🖨️ IMPRIMIR PDF</button>
    </div>

    <div class="container-filtros">
        <button class="btn-so-problema" id="btnFiltroErro" onclick="toggleProblemas()">
            ⚠️ VER APENAS PROBLEMAS / OCORRÊNCIAS
        </button>

        <div class="grid-filtros">
            <div class="campo-busca"><label>Cód / Projeto</label><input type="text" id="f-cod" oninput="carregarRelatorio()" placeholder="Buscar..."></div>
            <div class="campo-busca"><label>Medida / Produto</label><input type="text" id="f-prod" oninput="carregarRelatorio()" placeholder="Buscar..."></div>
            <div class="campo-busca"><label>Cliente</label><input type="text" id="f-cliente" oninput="carregarRelatorio()" placeholder="PO"></div>
            <div class="campo-busca"><label>Data</label><input type="date" id="f-data" onchange="carregarRelatorio()"></div>
            <div class="campo-busca"><label>Ocorrência (Texto)</label><input type="text" id="f-ocorr" oninput="carregarRelatorio()" placeholder="Buscar erro..."></div>
        </div>
        <button class="btn-limpar" onclick="limparFiltros()">Limpar Todos os Filtros</button>
    </div>

    <div class="painel-total">
        <h2>QUANTIDADE TOTAL FILTRADA</h2>
        <span id="totalPecas">0</span> unidades
    </div>

    <div class="tabela-container">
        <table>
            <thead>
                <tr>
                    <th>DATA</th><th>CÓD</th><th>CLIENTE / PROJETO</th><th>PRODUTO / MEDIDA</th><th>QTD</th><th>STATUS / OCORRÊNCIA</th>
                </tr>
            </thead>
            <tbody id="corpoRelatorio"></tbody>
        </table>
    </div>

    <script>
        const CH_HIST = "HIST_PROD_OFICIAL_V1";
        const CH_CAD = "produtos";
        let apenasErros = false;

        window.onload = () => carregarRelatorio();

        function toggleProblemas() {
            apenasErros = !apenasErros;
            const btn = document.getElementById('btnFiltroErro');
            btn.style.background = apenasErros ? "#000" : "var(--danger)";
            btn.innerText = apenasErros ? "🔍 MOSTRAR TODOS OS REGISTROS" : "⚠️ VER APENAS PROBLEMAS / OCORRÊNCIAS";
            carregarRelatorio();
        }

        function carregarRelatorio() {
            const hist = JSON.parse(localStorage.getItem(CH_HIST)) || [];
            const produtos = JSON.parse(localStorage.getItem(CH_CAD)) || [];
            
            const fCod = document.getElementById('f-cod').value.toLowerCase();
            const fProd = document.getElementById('f-prod').value.toLowerCase();
            const fCli = document.getElementById('f-cliente').value.toLowerCase();
            const fData = document.getElementById('f-data').value;
            const fOcorr = document.getElementById('f-ocorr').value.toLowerCase();

            const corpo = document.getElementById('corpoRelatorio');
            corpo.innerHTML = "";
            let total = 0;

            hist.forEach(reg => {
                // SINCRONIZAÇÃO POR ID OU CÓDIGO
                const info = produtos.find(p => p.id == reg.id_vinculo || p.codigo === reg.codigoVinculo) || {
                    codigo: reg.codigoVinculo || "---", projeto: "NÃO ENCONTRADO", cliente: "-", produto: "-", medida: "-"
                };

                const dataFormatada = fData ? fData.split('-').reverse().join('/') : "";
                
                const bateCod = !fCod || info.codigo.toLowerCase().includes(fCod) || info.projeto.toLowerCase().includes(fCod);
                const bateProd = !fProd || info.produto.toLowerCase().includes(fProd) || info.medida.toLowerCase().includes(fProd);
                const bateCli = !fCli || info.cliente.toLowerCase().includes(fCli);
                const bateData = !fData || reg.data === dataFormatada;
                const bateOcorr = !fOcorr || (reg.ocorrencia || "").toLowerCase().includes(fOcorr);
                
                const temErro = reg.ocorrencia && reg.ocorrencia.trim() !== "" && reg.ocorrencia.toUpperCase() !== "OK";
                const mostrarSeForProblema = !apenasErros || temErro;

                if (bateCod && bateProd && bateCli && bateData && bateOcorr && mostrarSeForProblema) {
                    total += Number(reg.prod || 0);
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${reg.data}</td>
                        <td style="font-weight:bold; color:var(--blue)">${info.codigo}</td>
                        <td>
                            <div style="font-weight:bold">${info.cliente}</div>
                            <div style="font-size:10px; color:#777">${info.projeto}</div>
                        </td>
                        <td>
                            <div>${info.produto}</div>
                            <div style="font-size:10px; color:#777">${info.medida}</div>
                        </td>
                        <td style="font-weight:bold; font-size:15px;">${reg.prod}</td>
                        <td>
                            <span class="${temErro ? 'status-erro' : 'status-ok'}">
                                ${reg.ocorrencia || 'OK'}
                            </span>
                        </td>
                    `;
                    corpo.appendChild(tr);
                }
            });

            document.getElementById('totalPecas').innerText = total;
        }

        function limparFiltros() {
            document.querySelectorAll('.campo-busca input').forEach(i => i.value = "");
            apenasErros = false;
            const btn = document.getElementById('btnFiltroErro');
            btn.style.background = "var(--danger)";
            btn.innerText = "⚠️ VER APENAS PROBLEMAS / OCORRÊNCIAS";
            carregarRelatorio();
        }
    </script>
</body>
</html>
